<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title$</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --fg: #b0b0b0;
    --fg-bright: #d0d0d0;
    --fg-dim: #707070;
    --bg: #0a0a0a;
    --bg-alt: #111111;
    --green: #33ff33;
    --green-dim: #1a8c1a;
    --amber: #ffb700;
    --red: #ff4444;
    --cyan: #00cccc;
    --border: #222222;
    --selection: #1a3a1a;
  }

  html {
    background: var(--bg);
    color: var(--fg);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(51, 255, 51, 0.015) 2px,
        rgba(51, 255, 51, 0.015) 4px
      );
    pointer-events: none;
    z-index: 9999;
  }

  ::selection {
    background: var(--selection);
    color: var(--green);
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  .nav-bar {
    display: flex;
    gap: 2rem;
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .nav-bar a {
    color: var(--fg-dim);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-bar a:hover,
  .nav-bar a.active {
    color: var(--green);
  }

  /* Headings */
  h1, h2, h3, h4, h5, h6 {
    color: var(--green);
    font-family: 'Space Mono', 'IBM Plex Mono', monospace;
    font-weight: 700;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    border-bottom: 2px solid var(--green-dim);
    padding-bottom: 0.5rem;
  }

  h1::before { content: '# '; color: var(--fg-dim); }

  h2 {
    font-size: 1.3rem;
    color: var(--amber);
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
  }

  h2::before { content: '## '; color: var(--fg-dim); }

  h3 {
    font-size: 1.1rem;
    color: var(--cyan);
  }

  h3::before { content: '### '; color: var(--fg-dim); }

  h4 { font-size: 1rem; color: var(--fg-bright); }

  /* Paragraphs */
  p {
    margin-bottom: 1rem;
  }

  /* Links */
  a {
    color: var(--green);
    text-decoration: none;
    border-bottom: 1px dotted var(--green-dim);
    transition: color 0.2s, border-color 0.2s;
  }

  a:hover {
    color: #66ff66;
    border-bottom-color: #66ff66;
  }

  /* Code */
  code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92em;
    background: var(--bg-alt);
    color: var(--green);
    padding: 0.15em 0.4em;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  pre {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green-dim);
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    overflow-x: auto;
    position: relative;
  }

  pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--fg-bright);
    font-size: 0.88rem;
    line-height: 1.6;
  }

  /* Blockquotes */
  blockquote {
    border-left: 3px solid var(--amber);
    background: rgba(255, 183, 0, 0.05);
    padding: 0.8rem 1.2rem;
    margin-bottom: 1.5rem;
    color: var(--amber);
  }

  blockquote p {
    margin-bottom: 0.5rem;
  }

  blockquote p:last-child {
    margin-bottom: 0;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
    font-size: 0.88rem;
  }

  th {
    background: var(--bg-alt);
    color: var(--green);
    text-align: left;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  td {
    padding: 0.5rem 0.8rem;
    border: 1px solid var(--border);
    vertical-align: top;
  }

  tr:hover td {
    background: rgba(51, 255, 51, 0.03);
  }

  /* Lists */
  ul, ol {
    margin-bottom: 1rem;
    padding-left: 1.5rem;
  }

  li {
    margin-bottom: 0.3rem;
  }

  li::marker {
    color: var(--green-dim);
  }

  /* Horizontal rules */
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  /* Strong / emphasis */
  strong { color: var(--fg-bright); font-weight: 700; }
  em { color: var(--fg); font-style: italic; }

  /* Footer */
  .footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--fg-dim);
    font-size: 0.8rem;
  }

  /* Responsive */
  @media (max-width: 600px) {
    html { font-size: 13px; }
    .container { padding: 1.5rem 1rem 3rem; }
    table { font-size: 0.8rem; }
    pre { padding: 0.8rem; }
  }
</style>
</head>
<body>
<div class="container">
    <nav class="nav-bar">
        <a href="index.html" id="nav-home">readme</a>
        <a href="docs.html" id="nav-docs">api docs</a>
    </nav>
$body$
</div>
<script>
  var path = window.location.pathname;
  if (path.endsWith('docs.html')) {
    document.getElementById('nav-docs').classList.add('active');
  } else {
    document.getElementById('nav-home').classList.add('active');
  }
</script>
</body>
</html>
