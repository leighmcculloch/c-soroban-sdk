name: Build, Deploy, and Invoke on Testnet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-deploy-invoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang and wasm target
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Build contracts
        run: make

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: examples/**/*.wasm

      - name: Install Stellar CLI
        run: curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh

      - name: Configure testnet and identity
        run: |
          stellar network use testnet
          stellar keys generate deployer --fund
          stellar keys use deployer

      - name: Deploy increment contract
        run: |
          stellar contract deploy \
            --alias increment \
            --wasm examples/increment/increment.wasm
          echo "Increment contract deployed"

      - name: Invoke increment (first call)
        run: test "$(stellar contract invoke --id increment -- increment)" = "1"

      - name: Invoke increment (second call)
        run: test "$(stellar contract invoke --id increment -- increment)" = "2"

      - name: Deploy token contract
        run: |
          stellar contract deploy \
            --alias token \
            --wasm examples/token/token.wasm \
            -- \
            --admin $(stellar keys address deployer) \
            --decimal 2 \
            --symbol "CT"

      - name: Token balance (initial)
        run: test "$(stellar contract invoke --id token -- balance --id deployer)" = '"0"'

      - name: Token mint
        run: stellar contract invoke --id token -- mint --to deployer --amount 1234

      - name: Token balance (after mint)
        run: test "$(stellar contract invoke --id token -- balance --id deployer)" = '"1234"'

      - name: Token transfer
        run: stellar contract invoke --id token -- transfer --from deployer --to CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4 --amount 123

      - name: Token balance (after transfer, sender)
        run: test "$(stellar contract invoke --id token -- balance --id deployer)" = '"1111"'

      - name: Token balance (after transfer, receiver)
        run: test "$(stellar contract invoke --id token -- balance --id CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4)" = '"123"'

